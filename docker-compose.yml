services:
  mahi-dashboard:
    build:
      context: ./mahi-dashboard
    container_name: mahi-dashboard
    restart: always
    healthcheck:
      # node:20-alpine has no curl — use BusyBox wget
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3145"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - traefik.enable=true
      - traefik.http.services.emma.loadbalancer.server.port=3145
      - traefik.http.routers.emma.rule=Host(`emma.ugentsailing.be`)
      - traefik.http.routers.emma.service=emma
      - traefik.http.routers.emma.entrypoints=https
      - traefik.http.routers.emma.tls=true
      - traefik.http.routers.emma.tls.certresolver=letsencrypt
      - traefik.http.routers.emma.middlewares=hsts@file
    networks:
      - traefik_proxy

  manet:
      build:
        context: ./manet
        dockerfile: manet.Dockerfile
      container_name: manet
      restart: always
      privileged: true
      sysctls:
        - net.ipv6.conf.all.disable_ipv6=1
        - net.ipv6.conf.default.disable_ipv6=1
      volumes:
        - ./manet:/app
      labels:
        - traefik.enable=true
        - traefik.http.services.manet-mqtt.loadbalancer.server.port=9001
        - traefik.http.routers.manet-mqtt.rule=Host(`mqtt.ugentsailing.be`)
        - traefik.http.routers.manet-mqtt.service=manet-mqtt
        - traefik.http.routers.manet-mqtt.entrypoints=https
        - traefik.http.routers.manet-mqtt.tls=true
        - traefik.http.routers.manet-mqtt.tls.certresolver=letsencrypt
      networks:
        - traefik_proxy

networks:
  traefik_proxy:
    external: true