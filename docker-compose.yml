services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

  mahi-dashboard:
    build:
      context: ./mahi-dashboard
    container_name: mahi-dashboard
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3145"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - web

  manet:
    build:
      context: ./manet
      dockerfile: manet.Dockerfile
    container_name: manet
    restart: always
    privileged: true
    # network_mode: host
    volumes:
      - ./manet:/app

networks:
  web:

volumes:
  caddy_data:
  caddy_config: